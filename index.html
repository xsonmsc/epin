
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DigiStore | Premium Rəqəmsal Həllər</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
            },
            padding: {
              'safe': 'env(safe-area-inset-bottom)',
            },
            colors: {
              background: '#0F1115', // Dark Base
              surface: '#181B21',    // Card Base
              surfaceHighlight: '#22262E', // Input/Hover
              primary: {
                DEFAULT: '#8B5CF6', // Neon Purple
                dark: '#7C3AED',
                glow: 'rgba(139, 92, 246, 0.5)'
              },
              secondary: {
                DEFAULT: '#6366F1', // Electric Blue
                glow: 'rgba(99, 102, 241, 0.5)'
              },
              accent: {
                DEFAULT: '#EC4899', // Pink Glow
                glow: 'rgba(236, 72, 153, 0.5)'
              },
              
              // Backward compatibility
              'gaming-dark': '#0F1115',
              'gaming-card': '#181B21',
              'gaming-neon': '#8B5CF6',
              'gaming-accent': '#EC4899',
            },
            animation: {
              'blob': 'blob 7s infinite',
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'slide-up': 'slideUp 0.5s ease-out forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(circle at top, #2D2F3F 0%, #181B21 45%, #0F1115 100%);
        color: #E5E7EB;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Professional Glass Effect */
      .glass {
        background: rgba(24, 27, 33, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      /* Card Style */
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(139, 92, 246, 0.15); /* Primary color low opacity border */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .glass-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(139, 92, 246, 0.4);
        box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.15);
        transform: translateY(-4px);
      }

      /* Premium Purple Gradient Button Style */
      .btn-primary {
        background: linear-gradient(135deg, #8B5CF6, #6366F1);
        color: white;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        box-shadow: 0 0 35px rgba(139, 92, 246, 0.8);
        transform: translateY(-2px);
      }
      
      /* Hide Scrollbar on some elements */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Custom Scrollbar Global */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0F1115; 
      }
      ::-webkit-scrollbar-thumb {
        background: #374151; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4B5563; 
      }
      
      /* Aurora Background - Adjusted opacity for cleaner look */
      .aurora-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      .aurora-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.15; /* Reduced opacity for professional feel */
        animation: blob 10s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.28.0?deps=react@18.2.0,react-dom@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
  <body>
    <!-- Background Gradient Blobs -->
    <div class="aurora-bg">
        <div class="aurora-blob bg-primary w-[500px] h-[500px] top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="aurora-blob bg-accent w-[500px] h-[500px] bottom-0 right-0 translate-x-1/2 translate-y-1/2 animation-delay-2000"></div>
        <div class="aurora-blob bg-secondary w-96 h-96 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-10 animation-delay-4000"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- IMPORTANT: Entry point for Vite/Vercel -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
